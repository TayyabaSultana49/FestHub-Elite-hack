<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FestHub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="landing" class="screen active">
    <div class="hero-gradient"></div>
    <div class="hero-content">
      <h1>Welcome to <span>FestHub</span></h1>
      <p>The ultimate multi-event management platform for clubs and fest committees.</p>
      <button id="goRole">Get Started</button>
    </div>
  </section>

  <section id="roleSelect" class="screen">
    <div class="center-box">
      <h2>FestHub</h2>
      <p>Choose your role to continue</p>
      <div class="role-grid">
        <button class="role-card" data-role="admin">
          <strong>Admin</strong><small>Create & manage events</small>
        </button>
        <button class="role-card" data-role="participant">
          <strong>Participant</strong><small>Browse & join events</small>
        </button>
      </div>
    </div>
  </section>

  <section id="app" class="screen">
    <header class="topbar">
      <div class="brand">FestHub</div>
      <nav id="mainNav"></nav>
      <div class="right-actions">
        <button id="notifyBtn" class="ghost">🔔</button>
        <button id="logoutBtn" class="ghost">Logout</button>
      </div>
    </header>
    <main id="view"></main>
  </section>

  <div id="modal" class="modal hidden">
    <div class="modal-card" id="modalContent"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
