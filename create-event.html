<body>
  <div class="container">
    <header>
      <div class="logo">FESTHUB</div>
      <button class="btn" onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
    </header>

    <main>
      <div class="card" style="max-width: 620px; margin: 0 auto;">
        <h2>Create New Event</h2>
        <form id="create-event-form">
          <input name="name" placeholder="Event Name" required />
          <textarea name="description" placeholder="Event Description"></textarea>
          <input name="date" type="date" required />
          <select name="mode">
            <option value="Offline">Offline</option>
            <option value="Online">Online</option>
            <option value="Hybrid">Hybrid</option>
          </select>
          <input name="maxAttendees" type="number" min="1" placeholder="Max Attendees (optional)" />
          <button type="submit" class="btn" style="width: 100%; padding: 14px;">Create Event</button>
        </form>
      </div>
    </main>
  </div>
